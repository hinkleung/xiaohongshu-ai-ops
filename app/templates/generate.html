{% extends "base.html" %}
{% block title %}生成中… — 小红书 AI 运营平台{% endblock %}
{% block content %}
<h1>Agent 生成进度</h1>
<p class="sub">AI Agent 正在协作生成文案</p>

<div id="app" v-cloak>
    <div class="log" ref="logEl">
        <template v-for="(p, i) in events" :key="i">
            <div class="log-line in">
                <div :class="['log-dot', p.status==='done'?'ok':p.status==='running'?'busy':'bad']"></div>
                <div>
                    <span :style="p.status==='done'?'color:var(--success)':p.status==='error'?'color:var(--error)':''">{{ p.message }}</span>
                    <span v-if="p.data?.flagged_count" style="color:var(--warn);font-size:.8rem;">（{{ p.data.flagged_count }}处 AI 痕迹）</span>
                    <span v-if="p.data?.warnings?.length" style="color:var(--warn);font-size:.8rem;">（规则: {{ p.data.warnings.join(', ') }}）</span>
                </div>
            </div>
        </template>
    </div>

    <div v-if="done" class="card" style="text-align:center;margin-top:24px;">
        <p style="font-size:1.1rem;font-weight:600;margin-bottom:12px;">文案生成完成 ✨</p>
        <a :href="'/posts/' + draftId" class="btn btn-accent">前往查看草稿</a>
    </div>

    <div v-if="error" class="card" style="text-align:center;margin-top:24px;border-color:var(--error);">
        <p style="color:var(--error);font-weight:600;margin-bottom:12px;">生成失败: {{ errorMsg }}</p>
        <a href="/" class="btn btn-outline">返回重试</a>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script defer src="/static/generate-progress.js"></script>
{% endblock %}
