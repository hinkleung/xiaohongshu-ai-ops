{% extends "base.html" %}
{% block title %}文章管理 — 小红书 AI 运营平台{% endblock %}
{% block content %}
<script id="page-data" type="application/json"><< {"posts": posts} | tojson | safe >></script>

<h1>文章管理</h1>
<p class="sub">管理草稿、已发布和失败的帖子</p>

<div id="app" v-cloak>
    <div class="tabs">
        <button @click="filter = ''" :class="['tab', filter === '' ? 'on' : '']">全部</button>
        <button @click="filter = 'draft'" :class="['tab', filter === 'draft' ? 'on' : '']">草稿</button>
        <button @click="filter = 'publishing'" :class="['tab', filter === 'publishing' ? 'on' : '']">发布中</button>
        <button @click="filter = 'published'" :class="['tab', filter === 'published' ? 'on' : '']">已发布</button>
        <button @click="filter = 'failed'" :class="['tab', filter === 'failed' ? 'on' : '']">失败</button>
    </div>

    <div style="display:flex;flex-direction:column;gap:12px;">
        <template v-for="post in filteredPosts" :key="post.id">
            <div class="card" style="cursor:pointer;" @click="goDetail(post.id)">
                <div class="card-header">
                    <span class="card-title">{{ post.title || '(无标题)' }}</span>
                    <span :class="'badge badge-' + post.status">{{ {draft:'草稿',publishing:'发布中',published:'已发布',failed:'失败'}[post.status] || post.status }}</span>
                </div>
                <div class="card-body">{{ (post.content || '').substring(0, 180) + '…' }}</div>
                <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;">
                    <span class="tag" v-for="tag in post.tags" :key="tag">#{{ tag }}</span>
                </div>
                <div style="font-size:.8rem;color:var(--text-muted);margin-top:8px;">
                    {{ '主题：' + (post.theme || '-').substring(0, 10) + ((post.theme || '').length > 10 ? '…' : '') + ' · ' + new Date(post.created_at).toLocaleDateString('zh-CN') }}
                </div>
                <div v-if="post.status === 'failed' && post.error_message" style="margin-top:8px;padding:6px 10px;background:var(--error);color:#fff;border-radius:8px;font-size:.75rem;opacity:.9;max-height:2.4em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" :title="post.error_message">
                    ⚠️ {{ post.error_message }}
                </div>
                <div class="card-foot">
                    <a :href="'/posts/' + post.id" class="btn btn-outline btn-sm">查看编辑</a>
                    <button @click.stop="deletePost(post.id)" class="btn btn-ghost btn-sm">删除</button>
                </div>
            </div>
        </template>
        <div v-if="!loading && filteredPosts.length === 0" class="empty"><p>暂无内容</p></div>
        <p v-if="loading" style="text-align:center;color:var(--text-muted);padding:40px;">加载中…</p>
    </div>

    <!-- Delete Post Modal -->
    <div v-if="showDeleteModal" style="position:fixed;inset:0;z-index:1001;background:rgba(0,0,0,.35);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;" @click.self="showDeleteModal = false">
        <div style="background:#ffffff;border:1px solid #e5e7eb;border-radius:16px;padding:28px;max-width:340px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.15);">
            <h3 style="margin-bottom:10px;font-size:1.1rem;">确认删除</h3>
            <p style="color:var(--text-secondary);font-size:.88rem;margin-bottom:20px;">此操作不可撤销，确定要删除这篇文章吗？</p>
            <div style="display:flex;gap:10px;justify-content:center;">
                <button @click="showDeleteModal = false" class="btn btn-outline">取消</button>
                <button @click="confirmDelete" class="btn btn-danger">确认删除</button>
            </div>
        </div>
    </div>
    <AppToast :show="toastShow" :message="toastMessage" :type="toastType" @close="toastShow = false" />
</div>
{% endblock %}
{% block scripts %}
<script defer src="/static/post-list.js"></script>
{% endblock %}
