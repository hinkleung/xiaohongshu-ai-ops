{% extends "base.html" %}
{% block title %}设置 — 小红书 AI 运营平台{% endblock %}
{% block content %}
<h1>设置</h1>

<div class="sec">
    <h2>AI Provider</h2>
    <p class="sub">管理 AI 提供商配置</p>
    <div x-data="aiConfigManager">
        <template x-for="cfg in configs" :key="cfg.id">
            <div class="card" style="margin-bottom:10px;">
                <div class="card-header">
                    <span class="card-title" style="display:flex;align-items:center;gap:8px;">
                        <span x-text="cfg.provider.toUpperCase()"></span>
                        <span x-show="cfg.is_active" class="badge badge-published">当前</span>
                    </span>
                </div>
                <div class="row" style="font-size:.84rem;color:var(--text-secondary);">
                    <div>Quick: <code x-text="cfg.quick_model"></code></div>
                    <div>Deep: <code x-text="cfg.deep_model"></code></div>
                </div>
                <div class="flex" style="margin-top:10px;">
                    <button @click="activate(cfg.id)" x-show="!cfg.is_active" class="btn btn-outline btn-sm">启用</button>
                    <button @click="remove(cfg.id)" class="btn btn-ghost btn-sm" style="color:var(--error);">删除</button>
                </div>
            </div>
        </template>

        <details style="cursor:pointer;margin-top:12px;">
            <summary style="font-weight:500;padding:8px 0;color:var(--accent);">＋ 添加新 Provider</summary>
            <form @submit.prevent="addConfig" class="card" style="margin-top:10px;">
                <div class="field">
                    <label>Provider</label>
                    <select x-model="form.provider" class="select" required>
                        <option value="">选择…</option><option>openai</option><option>claude</option><option>deepseek</option>
                    </select>
                </div>
                <div class="field"><label>API Key</label><input type="password" x-model="form.api_key" class="input" required placeholder="sk-…"></div>
                <div class="field"><label>API Base URL <span style="font-weight:400;color:var(--text-muted);">（可选）</span></label><input type="text" x-model="form.api_base" class="input" placeholder="留空使用默认"></div>
                <div class="row">
                    <div class="field"><label>Quick Model</label><input type="text" x-model="form.quick_model" class="input" required placeholder="gpt-4o-mini"></div>
                    <div class="field"><label>Deep Model</label><input type="text" x-model="form.deep_model" class="input" required placeholder="gpt-4o"></div>
                </div>
                <button type="submit" class="btn btn-accent">保存</button>
            </form>
        </details>
    </div>
</div>

<div class="sec">
    <h2>小红书账号</h2>
    <p class="sub">管理 MCP 连接和登录状态</p>
    <div x-data="xhsStatus" x-init="checkStatus" class="card">
        <div class="flex">
            <p x-show="loading" style="color:var(--text-muted);">检查中…</p>
            <span x-show="!loading && status?.is_logged_in" class="badge badge-published" style="font-size:.88rem;">已登录</span>
            <span x-show="!loading && status && !status.is_logged_in" class="badge badge-failed" style="font-size:.88rem;">未登录</span>
            <span x-show="status?.username" style="color:var(--text-secondary);" x-text="status.username"></span>
        </div>
        <div class="flex mt-4">
            <button @click="checkStatus" class="btn btn-outline btn-sm">刷新状态</button>
            <button @click="getQRCode" x-show="!status?.is_logged_in" class="btn btn-accent btn-sm">获取登录码</button>
        </div>
    </div>

    <!-- QR Code Modal -->
    <div x-show="showModal" class="modal-overlay" @click.self="closeModal">
        <div class="modal">
            <h3>扫码登录小红书</h3>
            <p style="color:var(--text-secondary);font-size:.85rem;margin-bottom:16px;">打开小红书 App 扫描二维码</p>
            <img :src="qrcode" alt="登录二维码">
            <div class="flex" style="justify-content:center;">
                <button @click="closeModal" class="btn btn-accent">完成登录，刷新状态</button>
            </div>
        </div>
    </div>
</div>

<div class="sec">
    <h2>MCP 服务</h2>
    <p class="sub">xiaohongshu-mcp 后端</p>
    <div class="card">
        <div class="flex" style="gap:12px;">
            <div style="width:8px;height:8px;border-radius:50%;background:var(--success);box-shadow:0 0 8px rgba(22,163,74,.4);"></div>
            <div>
                <p style="font-weight:500;">服务运行中</p>
                <p style="font-size:.84rem;color:var(--text-secondary);">MCP <code>localhost:18060/mcp</code></p>
                <p style="font-size:.8rem;color:var(--text-muted);">REST <code>/api/v1/*</code></p>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('aiConfigManager', () => ({
        configs: {{ configs | tojson | safe }},
        form: {provider:'',api_key:'',api_base:'',quick_model:'',deep_model:''},
        async addConfig() {
            const r = await fetch('/api/configs/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(this.form)});
            if(r.ok){this.configs.push(await r.json());this.form={provider:'',api_key:'',api_base:'',quick_model:'',deep_model:''};}
        },
        async activate(id){await fetch(`/api/configs/ai/${id}/activate`,{method:'POST'});this.configs.forEach(c=>c.is_active=c.id===id);},
        async remove(id){if(!confirm('确认删除？'))return;await fetch(`/api/configs/ai/${id}`,{method:'DELETE'});this.configs=this.configs.filter(c=>c.id!==id);},
    }));
    Alpine.data('xhsStatus', () => ({
        status:null,loading:false,qrcode:null,showModal:false,
        async checkStatus(){this.loading=true;try{const r=await fetch('/api/xhs/status');this.status=await r.json();}catch(e){this.status={is_logged_in:false}}this.loading=false;},
        async getQRCode(){const r=await fetch('/api/xhs/login',{method:'POST'});const d=await r.json();this.qrcode=d.img;this.showModal=true;},
        async closeModal(){this.showModal=false;this.qrcode=null;await this.checkStatus();},
    }));
});
</script>
{% endblock %}
