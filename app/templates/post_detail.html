{% extends "base.html" %}
{% block title %}文章详情 — 小红书 AI 运营平台{% endblock %}
{% block content %}
<script id="page-data" type="application/json"><< {"post": post} | tojson | safe >></script>

<div id="app" v-cloak>
    <template v-if="!loading && post">
        <div style="position:relative;">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;">
                <div>
                    <h1 style="margin-bottom:4px;">文章详情</h1>
                    <span :class="'badge badge-' + post.status">{{ {draft:'草稿',publishing:'发布中',published:'已发布',failed:'失败'}[post.status] || post.status }}</span>
                </div>
                <div class="flex">
                    <a href="/posts" class="btn btn-ghost btn-sm">← 返回</a>
                    <button @click="save" v-if="post.status !== 'published'" class="btn btn-outline btn-sm">保存</button>
                    <button @click="post.status === 'publishing' ? (showRepublishModal = true) : doPublish()" v-if="post.status !== 'published'" class="btn btn-accent btn-sm">发布</button>
                    <span v-if="post.status === 'publishing'" class="badge badge-publishing" style="font-size:.78rem;">⏳ 发布中…</span>
                </div>
            </div>

            <div class="row" style="margin-top:20px;">
                <div class="field">
                    <label>标题 <span style="color:var(--text-muted);font-weight:400;">{{ titleCount }}</span></label>
                    <input type="text" v-model="post.title" class="input" maxlength="60" @input="checkTitle" :disabled="post.status === 'published'">
                    <p v-if="titleErr" style="color:var(--error);font-size:.78rem;margin-top:4px;">{{ titleErr }}</p>
                </div>
                <div class="field">
                    <label>标签</label>
                    <div class="flex" style="align-items:center;">
                        <span v-for="(tag, i) in post.tags" :key="i" class="tag" style="gap:6px;padding:5px 12px;">
                            #{{ tag }}
                            <span @click="post.status !== 'published' && removeTag(i)" :style="'cursor:' + (post.status === 'published' ? 'default' : 'pointer') + ';opacity:' + (post.status === 'published' ? '.2' : '.5') + ';font-size:.7rem;'" title="移除">✕</span>
                        </span>
                        <span class="tag" style="border:1.5px dashed var(--border);background:transparent;color:var(--text-muted);cursor:pointer;gap:4px;padding:5px 12px;" @click="$refs.tagInput.focus()">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="opacity:.5;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            <input type="text" ref="tagInput" placeholder="添加" @keydown.enter.prevent="addTag" :disabled="post.status === 'published'" style="border:none;background:transparent;font-size:.82rem;width:48px;outline:none;color:inherit;font-family:inherit;padding:0;">
                        </span>
                    </div>
                </div>
            </div>

            <div class="field">
                <label>正文</label>
                <textarea v-model="post.content" class="textarea" rows="14" @input="checkContent" :disabled="post.status === 'published'"></textarea>
                <p v-if="contentErr" style="color:var(--error);font-size:.78rem;margin-top:4px;">{{ contentErr }}</p>
            </div>

            <div class="field">
                <label>图片 <span style="font-weight:400;color:var(--text-muted);">（小红书至少需要 1 张）</span></label>
                <div class="thumbs" style="margin-bottom:10px;">
                    <div v-for="(img, i) in post.images" :key="i" style="position:relative;cursor:pointer;" @click="openLightbox(img)">
                        <img :src="img" class="thumb" style="width:100px;height:100px;">
                        <button @click.stop="post.status !== 'published' && removeImage(i)" :disabled="post.status === 'published'" :style="'position:absolute;top:2px;right:2px;width:20px;height:20px;border-radius:50%;background:var(--error);color:#fff;border:none;font-size:.65rem;line-height:20px;text-align:center;' + (post.status === 'published' ? 'opacity:.3;cursor:default;' : 'cursor:pointer;')">×</button>
                    </div>
                </div>
                <button @click="!uploading && post.status !== 'published' && $refs.imgInput.click()" :disabled="uploading || post.status === 'published'"
                    class="btn btn-ghost btn-sm" style="gap:6px;font-weight:400;" :style="(uploading || post.status === 'published') ? 'opacity:.5;' : ''">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    <span>添加图片</span>
                </button>
                <input type="file" ref="imgInput" multiple accept="image/*" style="display:none" @change="uploadImages">
                <p v-if="imagesErr" style="color:var(--error);font-size:.78rem;">{{ imagesErr }}</p>
            </div>

            <!-- Metadata footer -->
            <div style="font-size:.8rem;color:var(--text-muted);margin-top:24px;padding-top:16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;">
                <div v-if="post.theme" style="word-break:break-all;">主题：<b style="color:var(--text-secondary);font-weight:500;">{{ post.theme }}</b></div>
                <!-- Activity Description (collapsible) -->
                <div v-if="post.activity_description">
                    <button @click="showActivity = !showActivity" style="background:none;border:none;font-size:.8rem;color:var(--text-muted);cursor:pointer;padding:0;display:flex;align-items:center;gap:4px;">
                        <span>{{ showActivity ? '▾' : '▸' }} 活动说明</span>
                    </button>
                    <div v-if="showActivity" style="margin-top:6px;padding:10px;background:var(--bg-hover);border-radius:var(--radius-sm);font-size:.8rem;color:var(--text-secondary);line-height:1.7;white-space:pre-wrap;word-break:break-all;">{{ post.activity_description }}</div>
                </div>
                <div v-if="post.ai_provider">AI 模型：<b style="color:var(--text-secondary);font-weight:500;">{{ post.ai_provider }}</b></div>
                <div>创建于 <b style="color:var(--text-secondary);font-weight:500;">{{ post.created_at ? post.created_at.substring(0, 19) : '-' }}</b></div>
                <div v-if="post.xhs_feed_id">FeedID：<code>{{ post.xhs_feed_id }}</code></div>
                <div v-if="post.xhs_note_url"><a :href="post.xhs_note_url" target="_blank" style="color:var(--accent);">🔗 打开笔记</a></div>
            </div>

            <!-- Publish failure reason -->
            <div v-if="post.status === 'failed' && post.error_message" style="margin-top:16px;padding:14px 16px;background:#fef2f2;border:1px solid #fecaca;border-radius:var(--radius-sm);font-size:.84rem;">
                <p style="font-weight:600;color:var(--error);margin-bottom:6px;">❌ 发布失败原因</p>
                <p style="color:var(--text-secondary);word-break:break-all;line-height:1.6;">{{ post.error_message }}</p>
            </div>

            <div v-if="!post.content && !post.title" style="margin-top:16px;padding:12px 16px;background:var(--warn);border-radius:var(--radius-sm);font-size:.84rem;text-align:center;">
                ⚠️ 内容为空 — 可能是 AI 生成过程中出现了问题，请尝试<a href="/" style="color:var(--accent);">重新生成</a>
            </div>
        </div>
    </template>

    <div v-if="!loading && !post" class="card" style="text-align:center;padding:40px;">
        <p v-if="error">{{ error }}</p>
        <p v-else>文章不存在或已被删除</p>
        <a href="/posts" class="btn btn-outline mt-4">返回列表</a>
    </div>

    <p v-if="loading" style="text-align:center;color:var(--text-muted);padding:40px;">加载中…</p>

    <!-- Re-publish confirm modal -->
    <div v-if="showRepublishModal" style="position:fixed;inset:0;z-index:1001;background:rgba(0,0,0,.35);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;" @click.self="showRepublishModal = false">
        <div style="background:#ffffff;border:1px solid #e5e7eb;border-radius:16px;padding:28px;max-width:340px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.15);">
            <h3 style="margin-bottom:10px;font-size:1.1rem;">重新发布</h3>
            <p style="color:var(--text-secondary);font-size:.88rem;margin-bottom:20px;">文章正在发布中，确定要重新发布吗？</p>
            <div style="display:flex;gap:10px;justify-content:center;">
                <button @click="showRepublishModal = false" class="btn btn-outline">取消</button>
                <button @click="confirmRepublish" class="btn btn-accent">确定发布</button>
            </div>
        </div>
    </div>

    <AppLightbox :show="showLightbox" :src="lightboxSrc" @close="showLightbox = false" />
    <AppToast :show="toastShow" :message="toastMessage" :type="toastType" @close="toastShow = false" />
</div>
{% endblock %}
{% block scripts %}
<script defer src="/static/post-editor.js"></script>
{% endblock %}
