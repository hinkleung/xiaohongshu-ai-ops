{% extends "base.html" %}
{% block title %}文章管理 — 小红书 AI 运营平台{% endblock %}
{% block content %}
<h1>文章管理</h1>
<p class="sub">管理草稿、已发布和失败的帖子</p>

<div x-data="postList">
    <div class="tabs">
        <button @click="filter = ''" :class="'tab ' + (filter === '' ? 'on' : '')">全部</button>
        <button @click="filter = 'draft'" :class="'tab ' + (filter === 'draft' ? 'on' : '')">草稿</button>
        <button @click="filter = 'published'" :class="'tab ' + (filter === 'published' ? 'on' : '')">已发布</button>
        <button @click="filter = 'failed'" :class="'tab ' + (filter === 'failed' ? 'on' : '')">失败</button>
    </div>

    <div style="display:flex;flex-direction:column;gap:12px;">
        <template x-for="post in filteredPosts" :key="post.id">
            <div class="card">
                <div class="card-header">
                    <span class="card-title" x-text="post.title || '(无标题)'"></span>
                    <span :class="'badge badge-' + post.status" x-text="statusLabel(post.status)"></span>
                </div>
                <div class="card-body" x-text="(post.content || '').substring(0, 180) + '…'"></div>
                <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;">
                    <template x-for="tag in post.tags" :key="tag">
                        <span class="tag" x-text="'#' + tag"></span>
                    </template>
                </div>
                <div style="font-size:.8rem;color:var(--text-muted);margin-top:8px;">
                    <span x-text="'主题：' + (post.theme || '-') + ' · ' + new Date(post.created_at).toLocaleDateString('zh-CN')"></span>
                </div>
                <div class="card-foot">
                    <a :href="'/posts/' + post.id" class="btn btn-outline btn-sm">查看编辑</a>
                    <button @click="deletePost(post.id)" class="btn btn-ghost btn-sm">删除</button>
                    <button x-show="post.status === 'draft'" @click="publishPost(post.id)" class="btn btn-accent btn-sm">发布</button>
                </div>
            </div>
        </template>
        <div x-show="filteredPosts.length === 0" class="empty"><p>暂无内容</p></div>
    </div>
</div>

<script>
document.addEventListener('alpine:init', () => {
    Alpine.data('postList', () => ({
        filter: '',
        posts: {{ posts | tojson | safe }},
        get filteredPosts() {
            return this.filter ? this.posts.filter(p => p.status === this.filter) : this.posts;
        },
        statusLabel(s) {
            return {draft:'草稿', published:'已发布', failed:'发布失败'}[s] || s;
        },
        async deletePost(id) {
            if (!confirm('确认删除？此操作不可撤销')) return;
            await fetch(`/api/posts/${id}`, {method: 'DELETE'});
            this.posts = this.posts.filter(p => p.id !== id);
        },
        async publishPost(id) {
            const r = await fetch(`/api/agent/${id}/publish`, {method: 'POST'});
            const d = await r.json();
            if (d.success) { const p = this.posts.find(x => x.id === id); if (p) p.status = 'published'; }
            else alert('发布失败: ' + (d.error || ''));
        },
    }));
});
</script>
{% endblock %}
