{% extends "base.html" %}
{% block title %}文章管理 — 小红书 AI 运营平台{% endblock %}
{% block content %}
<h1>文章管理</h1>
<p class="sub">管理草稿、已发布和失败的帖子</p>

<div x-data="postList">
    <div class="tabs">
        <button @click="filter = ''" :class="'tab ' + (filter === '' ? 'on' : '')">全部</button>
        <button @click="filter = 'draft'" :class="'tab ' + (filter === 'draft' ? 'on' : '')">草稿</button>
        <button @click="filter = 'published'" :class="'tab ' + (filter === 'published' ? 'on' : '')">已发布</button>
        <button @click="filter = 'failed'" :class="'tab ' + (filter === 'failed' ? 'on' : '')">失败</button>
    </div>

    <div style="display:flex;flex-direction:column;gap:12px;">
        <template x-for="post in filteredPosts" :key="post.id">
            <div class="card">
                <div class="card-header">
                    <span class="card-title" x-text="post.title || '(无标题)'"></span>
                    <span :class="'badge badge-' + post.status" x-text="statusLabel(post.status)"></span>
                </div>
                <div class="card-body" x-text="(post.content || '').substring(0, 180) + '…'"></div>
                <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;">
                    <template x-for="tag in post.tags" :key="tag">
                        <span class="tag" x-text="'#' + tag"></span>
                    </template>
                </div>
                <div style="font-size:.8rem;color:var(--text-muted);margin-top:8px;">
                    <span x-text="'主题：' + (post.theme || '-') + ' · ' + new Date(post.created_at).toLocaleDateString('zh-CN')"></span>
                </div>
                <div class="card-foot">
                    <a :href="'/posts/' + post.id" class="btn btn-outline btn-sm">查看编辑</a>
                    <button @click="deletePost(post.id)" class="btn btn-ghost btn-sm">删除</button>
                    <button x-show="post.status === 'draft'" @click="publishPost(post.id)" class="btn btn-accent btn-sm">发布</button>
                </div>
            </div>
        </template>
        <div x-show="filteredPosts.length === 0" class="empty"><p>暂无内容</p></div>
    </div>
</div>

<div id="posts-delete-modal" style="display:none;position:fixed;inset:0;z-index:1001;background:rgba(0,0,0,.35);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);align-items:center;justify-content:center;">
    <div style="background:#ffffff;border:1px solid #e5e7eb;border-radius:16px;padding:28px;max-width:340px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.15);">
        <h3 style="margin-bottom:10px;font-size:1.1rem;text-align:center;">确认删除</h3>
        <p style="text-align:center;color:var(--color-text-secondary);font-size:.88rem;margin-bottom:20px;">此操作不可撤销，确定要删除这篇文章吗？</p>
        <div style="display:flex;gap:10px;justify-content:center;">
            <button onclick="closePostsDeleteModal()" class="btn btn-outline">取消</button>
            <button onclick="confirmPostsDelete()" class="btn btn-danger">确认删除</button>
        </div>
    </div>
</div>

<script>
function showPostsDeleteModal() { document.getElementById('posts-delete-modal').style.display = 'flex'; document.addEventListener('keydown', onPostsDeleteEsc); }
function onPostsDeleteEsc(e) { if (e.key === 'Escape') closePostsDeleteModal(); }
function closePostsDeleteModal() { document.removeEventListener('keydown', onPostsDeleteEsc); document.getElementById('posts-delete-modal').style.display = 'none'; }
function confirmPostsDelete() {
    var id = window._deletePostId; closePostsDeleteModal();
    fetch('/api/posts/' + id, {method: 'DELETE'}).then(function() {
        window.dispatchEvent(new CustomEvent('posts-deleted', {detail: id}));
    });
}
function postsFlash(msg, isError) {
    var e = document.createElement('div'); e.textContent = msg;
    e.style.cssText = 'position:fixed;top:20px;right:20px;background:' + (isError ? 'var(--color-error)' : 'var(--color-success)') + ';color:#fff;padding:10px 20px;border-radius:12px;font-size:.85rem;z-index:999;animation:up .3s ease-out';
    document.body.appendChild(e); setTimeout(function(){e.style.opacity='0';e.style.transition='opacity .3s';setTimeout(function(){e.remove()},300)},2000);
}
document.addEventListener('alpine:init', () => {
    Alpine.data('postList', () => ({
        filter: '',
        posts: {{ posts | tojson | safe }},
        init() {
            var self = this;
            window.addEventListener('posts-deleted', function(e) {
                self.posts = self.posts.filter(p => p.id !== e.detail);
            });
        },
        get filteredPosts() {
            return this.filter ? this.posts.filter(p => p.status === this.filter) : this.posts;
        },
        statusLabel(s) {
            return {draft:'草稿', published:'已发布', failed:'发布失败'}[s] || s;
        },
        async deletePost(id) {
            window._deletePostId = id;
            showPostsDeleteModal();
        },
        async publishPost(id) {
            const r = await fetch(`/api/agent/${id}/publish`, {method: 'POST'});
            const d = await r.json();
            if (d.success) { const p = this.posts.find(x => x.id === id); if (p) p.status = 'published'; postsFlash('发布成功'); }
            else postsFlash('发布失败: ' + (d.error || ''), true);
        },
    }));
});
</script>
{% endblock %}
